<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="200" fill="#0d0d0d"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a2e" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="200" fill="url(#grid)"/>
  
  <!-- Glow effect -->
  <ellipse cx="400" cy="100" rx="300" ry="80" fill="#6366f1" opacity="0.1"/>
  
  <!-- Conductor baton -->
  <g transform="translate(120, 100) rotate(-30)">
    <line x1="0" y1="0" x2="60" y2="-80" stroke="#f472b6" stroke-width="3" stroke-linecap="round"/>
    <circle cx="60" cy="-80" r="6" fill="#f472b6"/>
  </g>
  
  <!-- Music notes floating -->
  <text x="80" y="60" font-size="20" fill="#6366f1" opacity="0.4">♪</text>
  <text x="180" y="140" font-size="16" fill="#f472b6" opacity="0.3">♫</text>
  <text x="620" y="50" font-size="18" fill="#6366f1" opacity="0.4">♩</text>
  <text x="720" y="130" font-size="20" fill="#f472b6" opacity="0.3">♬</text>
  
  <!-- Main title -->
  <text x="400" y="95" font-family="'SF Mono', 'Fira Code', monospace" font-size="52" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-2">gorkestra</text>
  
  <!-- Subtitle -->
  <text x="400" y="130" font-family="'SF Mono', monospace" font-size="13" fill="#a5b4fc" text-anchor="middle" letter-spacing="4">LLM ORCHESTRATION FOR THE UNHINGED</text>
  
  <!-- Tags -->
  <g transform="translate(400, 165)">
    <rect x="-140" y="-12" width="70" height="22" rx="11" fill="#6366f1" fill-opacity="0.2" stroke="#6366f1" stroke-opacity="0.4"/>
    <text x="-105" y="4" font-family="monospace" font-size="10" fill="#a5b4fc" text-anchor="middle">grok</text>
    
    <rect x="-60" y="-12" width="70" height="22" rx="11" fill="#f472b6" fill-opacity="0.2" stroke="#f472b6" stroke-opacity="0.4"/>
    <text x="-25" y="4" font-family="monospace" font-size="10" fill="#f9a8d4" text-anchor="middle">agents</text>
    
    <rect x="20" y="-12" width="70" height="22" rx="11" fill="#6366f1" fill-opacity="0.2" stroke="#6366f1" stroke-opacity="0.4"/>
    <text x="55" y="4" font-family="monospace" font-size="10" fill="#a5b4fc" text-anchor="middle">chains</text>
    
    <rect x="100" y="-12" width="50" height="22" rx="11" fill="#f472b6" fill-opacity="0.2" stroke="#f472b6" stroke-opacity="0.4"/>
    <text x="125" y="4" font-family="monospace" font-size="10" fill="#f9a8d4" text-anchor="middle">X</text>
  </g>
</svg>
